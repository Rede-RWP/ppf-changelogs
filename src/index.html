<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <title>Atualizações — Pizza Pizza</title>
    <base href="/" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="Histórico de atualizações do sistema corporativo Pizza Pizza Franchising."
    />
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <link rel="icon" type="image/x-icon" href="favicon.ico" />
    <link rel="apple-touch-icon" href="apple-touch-icon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;800&family=Barlow:wght@400;500;600&family=Bebas+Neue&display=swap"
      rel="stylesheet"
    />
    <script>
      (function () {
        try {
          var k = "rwp-theme";
          var s = localStorage.getItem(k);
          if (s === "dark" || s === "light") {
            document.documentElement.setAttribute("data-theme", s);
          } else {
            document.documentElement.setAttribute("data-theme", "light");
          }
        } catch (e) {
          document.documentElement.setAttribute("data-theme", "light");
        }
      })();
    </script>
  </head>
  <body>
    <app-root></app-root>
  </body>
</html>
